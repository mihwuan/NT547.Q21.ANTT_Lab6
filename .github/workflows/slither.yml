name: Slither Security Audit

on:
  push:
    branches: [ "main" ]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Run Slither Analyzer
      uses: crytic/slither-action@v0.3.0
      with:
        target: 'BadVault.sol'
        fail-on: 'high'